<!DOCTYPE html>
<html><head>
<script src="jspdf.umd.min.js"></script>
<script src="jspdf.plugin.autotable.min.js"></script>
</head><body>
<p id="status">Generating Style 3B preview PDF...</p>
<script>
fetch("index.html").then(function(r){return r.text()}).then(function(html){
  var m = html.match(/const GBVFX_LOGO\s*=\s*"([^"]+)"/);
  generatePDF(m ? m[1] : "");
});

function fmtGBP(v){return "\u00a3"+Math.round(v).toLocaleString();}
function formatDate(d){
  var p=d.split("-"),mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return parseInt(p[2])+" "+mo[parseInt(p[1])-1]+" "+p[0];
}

function generatePDF(GBVFX_LOGO){
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({orientation:"landscape",unit:"mm",format:"a4"});
  var pw=297,ph=210,margin=15;

  try{doc.addImage(GBVFX_LOGO,"PNG",margin,8,40,8.3);}catch(e){
    doc.setFontSize(32);doc.setFont("helvetica","bold");
    doc.setTextColor(232,138,42);doc.text("GB",margin,18);
    doc.setTextColor(153,153,153);doc.text("VFX",margin+doc.getTextWidth("GB"),18);
  }

  doc.setDrawColor(232,138,42);doc.setLineWidth(0.5);
  doc.line(margin,19,pw-margin,19);

  doc.setFontSize(12);doc.setTextColor(140,140,140);doc.setFont("helvetica","normal");
  doc.text("SUMMARY OF BID / ESTIMATE",margin,26);

  doc.setDrawColor(232,138,42);doc.setLineWidth(0.5);
  doc.line(margin,29,pw-margin,29);

  var infoY=36,c1=margin,c2=margin+95,c3=pw/2+80;

  doc.setFontSize(7);doc.setTextColor(140,140,140);doc.setFont("helvetica","normal");
  doc.text("PROJECT",c1,infoY);doc.text("CLIENT",c2,infoY);doc.text("DATE",c3,infoY);
  doc.setFontSize(10);doc.setTextColor(40,40,40);
  doc.text("Treasure Island (TREA)",c1,infoY+6);
  doc.text("Playground Entertainment",c2,infoY+6);
  doc.text("13 Apr 2026",c3,infoY+6);
  doc.setFontSize(7);doc.setTextColor(140,140,140);
  doc.text("TYPE",c1,infoY+15);doc.text("CONTACT",c2,infoY+15);
  doc.setFontSize(10);doc.setTextColor(40,40,40);
  doc.text("VFX - Episodic",c1,infoY+21);doc.text("Mark Hedges",c2,infoY+21);

  var tableY=infoY+32,tableW=pw/2-margin+5,rowH=7;
  var eps=[{c:"101",v:74650},{c:"102",v:61900},{c:"103",v:59400},{c:"104",v:110200},{c:"105",v:92350},{c:"106",v:65450}];

  doc.setFont("helvetica","bold");doc.setFontSize(9);doc.setTextColor(60,60,60);
  doc.text("PRODUCTION",margin+3,tableY+5);
  doc.text(fmtGBP(115800),margin+tableW-3,tableY+5,{align:"right"});
  doc.setDrawColor(220,220,220);doc.line(margin,tableY+rowH,margin+tableW,tableY+rowH);
  tableY+=rowH+1;

  doc.setFont("helvetica","normal");doc.setFontSize(9);
  eps.forEach(function(ep){
    doc.setTextColor(60,60,60);
    doc.text("VFX "+ep.c,margin+3,tableY+5);
    doc.text(fmtGBP(ep.v),margin+tableW-3,tableY+5,{align:"right"});
    doc.setDrawColor(220,220,220);doc.line(margin,tableY+rowH,margin+tableW,tableY+rowH);
    tableY+=rowH;
  });

  doc.setTextColor(60,60,60);
  doc.text("CONTINGENCY",margin+3,tableY+5);
  doc.text(fmtGBP(100000),margin+tableW-3,tableY+5,{align:"right"});
  doc.setDrawColor(220,220,220);doc.line(margin,tableY+rowH,margin+tableW,tableY+rowH);
  tableY+=rowH;

  doc.text("PHOENIX",margin+3,tableY+5);
  doc.text(fmtGBP(30000),margin+tableW-3,tableY+5,{align:"right"});
  doc.setDrawColor(220,220,220);doc.line(margin,tableY+rowH,margin+tableW,tableY+rowH);
  tableY+=rowH;

  tableY+=3;
  doc.setFont("helvetica","bold");doc.setFontSize(11);doc.setTextColor(232,138,42);
  doc.text("TOTAL",margin+3,tableY+6);
  doc.text(fmtGBP(709750),margin+tableW-3,tableY+6,{align:"right"});

  // Vertical bar chart
  var axisMax=120000;
  var chartLeft=pw/2+15,chartRight=pw-margin;
  var yAxisX=chartLeft+22;
  var chartTop=infoY+32,chartBottom=chartTop+95;
  var plotH=chartBottom-chartTop,plotW=chartRight-yAxisX;

  doc.setFontSize(9);doc.setTextColor(120,120,120);doc.setFont("helvetica","normal");
  doc.text("13 Apr 2026",yAxisX+plotW/2,chartTop-5,{align:"center"});

  for(var t=0;t<=4;t++){
    var tv=axisMax*t/4,ty=chartBottom-(t/4)*plotH;
    doc.setFontSize(6);doc.setTextColor(140,140,140);
    doc.text(fmtGBP(tv),chartLeft+20,ty+1,{align:"right"});
    doc.setDrawColor(230,230,230);doc.setLineWidth(0.2);
    doc.line(yAxisX,ty,chartRight,ty);
  }

  var nB=eps.length,bSlot=plotW/nB,bW=bSlot*0.6,bG=bSlot*0.2;
  eps.forEach(function(ep,i){
    var bH=(ep.v/axisMax)*plotH,bx=yAxisX+i*bSlot+bG,by=chartBottom-bH;
    doc.setFillColor(150,160,172);doc.rect(bx,by,bW,bH,"F");
    doc.setFontSize(7);doc.setTextColor(60,60,60);
    doc.text(fmtGBP(ep.v),bx+bW/2,by-2,{align:"center"});
    doc.setFontSize(7);doc.setTextColor(100,100,100);
    doc.text("VFX "+ep.c,bx+bW/2,chartBottom+5,{align:"center"});
  });

  doc.setFontSize(7);doc.setTextColor(180,180,180);
  doc.text("Generated 13/04/2026",pw-margin,ph-8,{align:"right"});

  doc.save("GBVFX_Style3B_Summary_Mock.pdf");
  document.getElementById("status").textContent="Done \u2014 check Downloads for GBVFX_Style3B_Summary_Mock.pdf";
}
</script></body></html>
