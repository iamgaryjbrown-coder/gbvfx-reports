<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GBVFX Reports</title>
<style>
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --card: #222; --border: #333;
    --text: #e0e0e0; --text-dim: #888; --accent: #4a9eff; --accent-hover: #6ab4ff;
    --orange: #e88a2a; --green: #2ecc71; --red: #e74c3c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 24px; max-width: 900px; margin: 0 auto; }
  .logo { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
  .logo .gb { color: var(--orange); } .logo .vfx { color: #999; }
  h1 { font-size: 16px; color: var(--text-dim); font-weight: 400; margin-bottom: 24px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; }
  label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }
  input, select { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); font-size: 14px; font-family: inherit; }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field { margin-bottom: 12px; }
  .episode-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .ep-check { display: flex; align-items: center; gap: 4px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 13px; user-select: none; }
  .ep-check:has(input:checked) { border-color: var(--accent); background: rgba(74, 158, 255, 0.1); }
  .ep-check.all-check:has(input:checked) { border-color: var(--orange); background: rgba(232, 138, 42, 0.15); }
  .ep-check input { width: auto; accent-color: var(--accent); }
  .check-group { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
  .check-group label { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text); }
  .check-group input { width: auto; accent-color: var(--accent); }
  .check-group label:has(input:checked) { border-color: var(--accent); background: rgba(74, 158, 255, 0.1); }
  .btn { padding: 12px 28px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { background: #555; cursor: not-allowed; }
  .status { margin-top: 12px; font-size: 13px; color: var(--text-dim); }
  .status.error { color: var(--red); } .status.success { color: var(--green); }
  .token-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 20px; padding: 12px 16px; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); }
  .token-bar input { flex: 1; }
  .token-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
  .token-bar .dot.ok { background: var(--green); }
  .token-bar button { padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: var(--text); cursor: pointer; font-size: 13px; }
  .hidden { display: none; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="logo"><span class="gb">GB</span><span class="vfx">VFX</span></div>
<h1>ShotGrid Report Generator</h1>

<!-- Token Bar -->
<div class="token-bar">
  <div class="dot" id="connDot"></div>
  <input type="password" id="tokenInput" placeholder="API Token" autocomplete="off" onkeydown="if(event.key==='Enter')saveToken()">
  <button id="connBtn" onclick="saveToken()">Connect</button>
</div>

<!-- Project & Episodes -->
<div class="card">
  <div class="card-title">Report Setup</div>
  <div class="field">
    <label>Project</label>
    <select id="projectSelect" onchange="onProjectChange()">
      <option value="">Select project...</option>
    </select>
  </div>
  <div class="field">
    <label>Summary Page — Episodes</label>
    <div class="episode-grid" id="episodeGrid">
      <span style="color:var(--text-dim);font-size:13px;">Select a project first</span>
    </div>
  </div>
  <div class="field" style="margin-top:12px;">
    <label>Shot Detail Pages — Episodes</label>
    <div class="episode-grid" id="shotEpisodeGrid">
      <span style="color:var(--text-dim);font-size:13px;">Select a project first</span>
    </div>
  </div>
</div>

<!-- Filters -->
<div class="card">
  <div class="card-title">Filters</div>
  <div class="check-group">
    <label><input type="checkbox" id="filterUninvoiced"> To Be Invoiced</label>
  </div>
</div>

<!-- Optional Columns -->
<div class="card">
  <div class="card-title">Include Columns</div>
  <div class="check-group">
    <label><input type="checkbox" id="colCost" checked> Cost</label>
    <label><input type="checkbox" id="colNotes" checked> Quick Notes</label>
    <label><input type="checkbox" id="colVers"> Vers With Edit</label>
    <label><input type="checkbox" id="colExr"> EXR Package</label>
    <label><input type="checkbox" id="colPresentNext"> Next Ver Expected</label>
    <label><input type="checkbox" id="colInvoiced"> GB Invoiced</label>
  </div>
</div>

<!-- Details -->
<div class="card" id="costFields">
  <div class="row-3">
    <div class="field">
      <label>Client / Studio</label>
      <input type="text" id="clientInput" placeholder="Auto-filled">
    </div>
    <div class="field">
      <label>Contact</label>
      <input type="text" id="contactInput" placeholder="Auto-filled">
    </div>
    <div class="field">
      <label>Bid Date</label>
      <input type="date" id="bidDateInput">
    </div>
  </div>
</div>

<!-- Generate -->
<div class="card">
  <button class="btn btn-primary" id="generateBtn" onclick="generateReport()" disabled>Generate PDF</button>
  <div class="status" id="statusMsg"></div>
</div>

<script>
const API_BASE = "https://deliver.gbvfx.com";
let TOKEN = localStorage.getItem("gbvfx_report_token") || "8fc2bc9fd62210a2c727f10952535db3ef4309119ed1ba6850bd99e719739938";
let PROJECTS = [];
let EPISODES = [];

// Init
document.getElementById("bidDateInput").value = new Date().toISOString().split("T")[0];
if (TOKEN) {
  document.getElementById("tokenInput").value = "••••••••";
  loadProjects().then(function() {
    document.getElementById("connDot").classList.add("ok");
    document.getElementById("connBtn").textContent = "Connected";
  }).catch(function() {
    document.getElementById("connDot").classList.remove("ok");
  });
}

// Show/hide cost fields based on checkbox
document.getElementById("colCost").addEventListener("change", function() {
  document.getElementById("costFields").style.display = this.checked ? "block" : "none";
});

async function apiFetch(path, options) {
  var res = await fetch(API_BASE + path, {
    ...options,
    headers: { "Authorization": "Bearer " + TOKEN, "Content-Type": "application/json", ...(options && options.headers || {}) },
  });
  if (!res.ok) throw new Error("API " + res.status + ": " + (await res.text()));
  return res.json();
}

async function saveToken() {
  var val = document.getElementById("tokenInput").value.trim();
  if (!val || val === "••••••••") return;
  TOKEN = val;
  localStorage.setItem("gbvfx_report_token", TOKEN);
  document.getElementById("tokenInput").value = "••••••••";
  try {
    await loadProjects();
    document.getElementById("connDot").classList.add("ok");
    document.getElementById("connBtn").textContent = "Connected";
    setStatus("Connected!", "success");
    setTimeout(function() { setStatus(""); }, 2000);
  } catch (e) {
    document.getElementById("connDot").classList.remove("ok");
    setStatus("Connection failed — check token", "error");
  }
}

async function loadProjects() {
  var data = await apiFetch("/api/reports/projects");
  PROJECTS = data.projects;
  var sel = document.getElementById("projectSelect");
  var html = '<option value="">Select project...</option>';
  PROJECTS.forEach(function(p) {
    html += '<option value="' + p.id + '" data-code="' + p.code + '" data-client="' + (p.client || '') + '" data-contact="' + (p.contact || '') + '">' + p.name + ' (' + p.code + ')</option>';
  });
  sel.innerHTML = html;
}

async function resolveContact(code) {
  // Read from server-side contacts (shared across all machines)
  try {
    var contacts = await apiFetch("/api/reports/contacts");
    var proj = contacts[code];
    if (!proj) return null;
    var pref = proj.sg_forms_contact; // "producer" or "pps"
    if (!pref) return null;
    var cList = proj.contacts || [];
    var match = cList.find(function(c) { return c.role.toLowerCase() === pref.toLowerCase(); });
    if (match) return { client: proj.production_company || "", contact: match.name || "" };
  } catch (e) {}
  return null;
}

async function onProjectChange() {
  var sel = document.getElementById("projectSelect");
  var pid = sel.value;
  if (!pid) {
    document.getElementById("episodeGrid").innerHTML = '<span style="color:var(--text-dim);font-size:13px;">Select a project first</span>';
    document.getElementById("shotEpisodeGrid").innerHTML = '<span style="color:var(--text-dim);font-size:13px;">Select a project first</span>';
    document.getElementById("generateBtn").disabled = true;
    return;
  }
  var opt = sel.options[sel.selectedIndex];
  var code = opt.dataset.code;

  // Resolve contact from server-side contacts, fallback to API data
  var resolved = await resolveContact(code);
  if (resolved) {
    document.getElementById("clientInput").value = resolved.client;
    document.getElementById("contactInput").value = resolved.contact;
  } else {
    document.getElementById("clientInput").value = opt.dataset.client || "";
    document.getElementById("contactInput").value = opt.dataset.contact || "";
  }

  try {
    var data = await apiFetch("/api/reports/episodes?project_id=" + pid);
    EPISODES = data.episodes;
    renderEpisodes();
  } catch (e) {
    setStatus("Failed to load episodes: " + e.message, "error");
  }
}

function renderEpisodes() {
  // Summary episodes
  var grid = document.getElementById("episodeGrid");
  var html = '<label class="ep-check all-check"><input type="checkbox" id="epAll" onchange="toggleAll(\'ep\')" checked> All</label>';
  EPISODES.forEach(function(ep) {
    html += '<label class="ep-check"><input type="checkbox" class="ep-cb" value="' + ep.code + '" checked onchange="checkEpSelection(\'ep\')"> ' + ep.code + '</label>';
  });
  grid.innerHTML = html;

  // Shot detail episodes
  var grid2 = document.getElementById("shotEpisodeGrid");
  var html2 = '<label class="ep-check all-check"><input type="checkbox" id="shotEpAll" onchange="toggleAll(\'shotEp\')" checked> All</label>';
  EPISODES.forEach(function(ep) {
    html2 += '<label class="ep-check"><input type="checkbox" class="shotep-cb" value="' + ep.code + '" checked onchange="checkEpSelection(\'shotEp\')"> ' + ep.code + '</label>';
  });
  grid2.innerHTML = html2;

  document.getElementById("generateBtn").disabled = false;
}

function toggleAll(prefix) {
  var allId = prefix === "shotEp" ? "shotEpAll" : "epAll";
  var cls = prefix === "shotEp" ? ".shotep-cb" : ".ep-cb";
  var checked = document.getElementById(allId).checked;
  document.querySelectorAll(cls).forEach(function(cb) { cb.checked = checked; });
}

function checkEpSelection(prefix) {
  var allId = prefix === "shotEp" ? "shotEpAll" : "epAll";
  var cls = prefix === "shotEp" ? ".shotep-cb" : ".ep-cb";
  var all = document.querySelectorAll(cls);
  var checked = document.querySelectorAll(cls + ":checked");
  document.getElementById(allId).checked = (all.length === checked.length);
}

function getSelectedEpisodes(prefix) {
  var allId = prefix === "shotEp" ? "shotEpAll" : "epAll";
  var cls = prefix === "shotEp" ? ".shotep-cb" : ".ep-cb";
  if (document.getElementById(allId) && document.getElementById(allId).checked) return ["all"];
  var selected = [];
  document.querySelectorAll(cls + ":checked").forEach(function(cb) { selected.push(cb.value); });
  return selected.length > 0 ? selected : ["all"];
}

function parseExtraLines(str) {
  if (!str || !str.trim()) return [];
  return str.split(",").map(function(item) {
    var parts = item.trim().split(":");
    if (parts.length === 2) return { name: parts[0].trim(), value: parseFloat(parts[1]) || 0 };
    return null;
  }).filter(Boolean);
}

function setStatus(msg, cls) {
  var el = document.getElementById("statusMsg");
  el.textContent = msg;
  el.className = "status" + (cls ? " " + cls : "");
}

async function generateReport() {
  var btn = document.getElementById("generateBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Fetching data...';
  setStatus("");

  var sel = document.getElementById("projectSelect");
  var projectId = parseInt(sel.value);
  var projectCode = sel.options[sel.selectedIndex].dataset.code;
  var projectName = sel.options[sel.selectedIndex].text;
  var summaryEpisodes = getSelectedEpisodes("ep");
  var shotEpisodes = getSelectedEpisodes("shotEp");

  var showCost = document.getElementById("colCost").checked;
  var showNotes = document.getElementById("colNotes").checked;
  var showVers = document.getElementById("colVers").checked;
  var showExr = document.getElementById("colExr").checked;
  var showPresentNext = document.getElementById("colPresentNext").checked;
  var showInvoiced = document.getElementById("colInvoiced").checked;
  var showProd = false;

  try {
    // Step 1: fetch shot data — pass shot_episodes so thumbnails only download for those
    btn.innerHTML = '<span class="spinner"></span>Querying ShotGrid...';
    var filterUninvoiced = document.getElementById("filterUninvoiced").checked;
    var data = await apiFetch("/api/reports/shots", {
      method: "POST",
      body: JSON.stringify({
        project_id: projectId,
        episodes: ["all"],
        thumb_episodes: shotEpisodes,
        filter_uninvoiced: filterUninvoiced
      }),
    });

    // Step 2: build payload
    var payload = {
      project_name: projectName,
      project_code: projectCode,
      client: document.getElementById("clientInput").value || "",
      contact: document.getElementById("contactInput").value || "",
      bid_date: document.getElementById("bidDateInput").value || new Date().toISOString().split("T")[0],
      extra_lines: parseExtraLines((document.getElementById("extraLinesInput") || {}).value || ""),
      episode_totals: data.episode_totals,
      grand_total: data.grand_total,
      shots: data.shots,
      summary_episodes: summaryEpisodes,
      shot_episodes: shotEpisodes,
      show_cost: showCost,
      show_notes: showNotes,
      show_vers: showVers,
      show_exr: showExr,
      show_present_next: showPresentNext,
      show_invoiced: showInvoiced,
      show_prod: showProd,
      report_title: filterUninvoiced ? "SHOTS TO BE INVOICED" : null,
    };

    // Step 3: request PDF from server
    btn.innerHTML = '<span class="spinner"></span>Generating PDF...';
    var res = await fetch(API_BASE + "/api/reports/pdf", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + TOKEN },
      body: JSON.stringify(payload),
    });

    if (!res.ok) {
      var errText = await res.text();
      throw new Error("PDF generation failed: " + errText);
    }

    // Step 4: download
    var blob = await res.blob();
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    var dateStr = new Date().toISOString().split("T")[0].replace(/-/g, "");
    var reportType = filterUninvoiced ? "To_Be_Invoiced" : (showCost ? "Cost" : "Status");
    a.download = "GBVFX_" + projectCode + "_" + reportType + "_" + dateStr + ".pdf";
    a.click();
    URL.revokeObjectURL(url);

    setStatus("PDF downloaded!", "success");
  } catch (e) {
    setStatus(e.message, "error");
  }

  btn.disabled = false;
  btn.textContent = "Generate PDF";
}
</script>
</body>
</html>
